name: Update Licensed Operator Lists

on:
  # ── Scheduled runs ──────────────────────────────────────────────────────────
  # Runs every 10 days at 08:00 UTC (09:00 or 10:00 Paris time depending on DST).
  # To test at high cadence change to e.g. "0 * * * *" (every hour).
  # Cron syntax: minute hour day-of-month month day-of-week
  schedule:
    - cron: "0 5,14,22 * * *"

  # ── Manual trigger ───────────────────────────────────────────────────────────
  # Lets you run the workflow from the GitHub Actions tab at any time,
  # with an optional selector for which scrapers to run.
  workflow_dispatch:
    inputs:
      scrapers:
        description: "Which scrapers to run (comma-separated, or 'all')"
        required: false
        default: "all"
        type: string

env:
  TZ: Europe/Paris
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-lists:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    permissions:
      contents: write       # push branches
      pull-requests: write  # open PRs

    steps:
      # ── 1. Check out only the scrapers folder (sparse checkout) ────────────
      # We need the scraper scripts but NOT the CSV files — if we check out
      # the CSVs, the freshly scraped output overwrites them and compare_and_pr.py
      # ends up comparing a file against itself (always "no changes").
      # Sparse checkout gives us just the scripts without the CSVs.
      - name: Checkout scrapers only
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            scrapers
          sparse-checkout-cone-mode: false

      # ── 2. Set up Python ────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── 3. Install dependencies ──────────────────────────────────────────────
      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 playwright pandas openpyxl pytz curl-cffi
          playwright install chromium --with-deps

      # ── 4. Run scrapers ──────────────────────────────────────────────────────
      # Each scraper writes its canonical CSV relative to its own location.
      # We cd into scrapers/ so all CSVs land there, and compare_and_pr.py
      # (which also lives in scrapers/) finds them in the same directory.
      - name: Run scrapers
        run: |
          cd scrapers
          INPUT="${{ github.event.inputs.scrapers }}"
          SCRAPERS="${INPUT:-all}"
          echo "Scraper selection: $SCRAPERS"

          run_scraper() {
            if [ ! -f "$1" ]; then
              echo "⚠️  $1 not found — skipping."
              return
            fi
            echo "▶️  Running $1..."
            python "$1" && echo "✅  $1 done" || echo "❌  $1 failed"
          }

          if [ "$SCRAPERS" = "all" ]; then
            for f in fetch_*.py; do
              run_scraper "$f"
            done
          else
            IFS=',' read -ra LIST <<< "$SCRAPERS"
            for name in "${LIST[@]}"; do
              name=$(echo "$name" | xargs)
              run_scraper "fetch_${name}.py"
            done
          fi

      # ── 5. Upload debug artifacts (if any scraper produced them) ─────────────
      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-debug
          path: scrapers/debug_*.html
          if-no-files-found: ignore

      # ── 6. Verify CSVs were produced ─────────────────────────────────────────
      - name: Verify CSVs produced
        run: |
          echo "CSVs in scrapers/:"
          ls -lh scrapers/*.csv 2>/dev/null || echo "  (none found)"

      # ── 7. Compare and open PR ───────────────────────────────────────────────
      - name: Compare and open PR
        id: compare
        env:
          GITHUB_TOKEN: ${{ secrets.GAMBLEEAGLE_TOKEN }}
        run: |
          cd scrapers
          python compare_and_pr.py | tee /tmp/compare_output.txt
          PR_URL=$(grep "PR opened:" /tmp/compare_output.txt | sed 's/.*PR opened: //')
          echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT
          if grep -q "No PR needed" /tmp/compare_output.txt; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      # ── 7. Build email body ───────────────────────────────────────────────────
      - name: Build email body
        id: email
        if: steps.compare.outputs.changed == 'true'
        run: |
          RUN_DATE=$(date +'%Y%m%d')
          echo "date=$RUN_DATE" >> $GITHUB_OUTPUT

          COMPARE_OUTPUT=$(cat /tmp/compare_output.txt)
          PR_URL="${{ steps.compare.outputs.pr_url }}"
          RUN_NUM="${{ github.run_number }}"

          # Write to GITHUB_OUTPUT using multiline syntax
          {
            echo "body<<BODYEOF"
            echo "Gamble Eagle - List Update Ready to Review"
            echo ""
            echo "Date:  ${RUN_DATE}"
            echo "Run:   #${RUN_NUM}"
            echo "PR:    ${PR_URL}"
            echo ""
            echo "Changes detected:"
            echo ""
            echo "${COMPARE_OUTPUT}"
            echo ""
            echo "Review and merge the PR to deploy changes to the extension."
            echo "BODYEOF"
          } >> $GITHUB_OUTPUT

      # ── 8. Send email summary ────────────────────────────────────────────────
      - name: Send email summary
        if: steps.compare.outputs.changed == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          to: ${{ secrets.MAIL_USERNAME }}
          from: Gamble Eagle <${{ secrets.MAIL_USERNAME }}>
          subject: "🦅 Gamble Eagle — List Update Ready to Review ${{ steps.email.outputs.date }} #${{ github.run_number }}"
          body: ${{ steps.email.outputs.body }}

      # ── 9. Send failure email ────────────────────────────────────────────────
      - name: Send failure notification
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          to: ${{ secrets.MAIL_USERNAME }}
          from: Gamble Eagle <${{ secrets.MAIL_USERNAME }}>
          subject: "❌ Gamble Eagle — Workflow Failed #${{ github.run_number }}"
          body: |
            The Gamble Eagle update workflow failed.

            Run #${{ github.run_number }}: https://github.com/itsJustinCase/gamble-eagle/actions

            Check the Actions log for details.
