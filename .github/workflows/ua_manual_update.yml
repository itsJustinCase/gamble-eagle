name: UA - Manual List Update

on:
  workflow_dispatch:

jobs:
  process-ua:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run UA Processor
        run: python UA/process_ukraine.py

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add ukraine.csv ukraine_blacklist.csv
          git diff --quiet && git diff --staged --quiet || (git commit -m "Manual update: Ukraine lists" && git push)

      - name: Send failure alert
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          to: ${{ secrets.MAIL_USERNAME }}
          from: Gamble Eagle <${{ secrets.MAIL_USERNAME }}>
          subject: "🚨 Ukraine manual update FAILED #${{ github.run_number }}"
          body: |
            The UA manual update workflow failed.

            This usually means process_ukraine.py hit the failsafe —
            the full_database.csv may have 0 or suspiciously few domains.

            Check the Actions log for details:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
