name: Monitor API Changes

on:
  schedule:
    - cron: '0 5,15 * * *'
  workflow_dispatch:

jobs:
  check-api:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests

      - name: Run monitor script
        id: monitor
        continue-on-error: true
        run: |
          # Capture output to file; also echo to console
          python monitor.py > monitor_output.txt 2>&1
          EXIT_CODE=$?
          cat monitor_output.txt

          if [ $EXIT_CODE -eq 1 ]; then
            echo "change_detected=true" >> $GITHUB_OUTPUT
            echo "old_date=$(grep 'OLD_DATE=' monitor_output.txt | cut -d'=' -f2)" >> $GITHUB_OUTPUT
            echo "old_count=$(grep 'OLD_COUNT=' monitor_output.txt | cut -d'=' -f2)" >> $GITHUB_OUTPUT
            echo "new_date=$(grep 'NEW_DATE=' monitor_output.txt | cut -d'=' -f2)" >> $GITHUB_OUTPUT
            echo "new_count=$(grep 'NEW_COUNT=' monitor_output.txt | cut -d'=' -f2)" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Commit updated state
        if: steps.monitor.outcome == 'failure'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add last_state.json
          git diff --staged --quiet || git commit -m "Update API state: Change detected" && git push

      - name: Build email body
        id: email
        if: steps.monitor.outcome == 'failure'
        run: |
          {
            echo "body<<BODYEOF"
            echo "Ukraine API Update Detected"
            echo ""
            echo "A change in the database has been identified:"
            echo ""
            echo "PREVIOUS STATE:"
            echo "  Date:  ${{ steps.monitor.outputs.old_date }}"
            echo "  Count: ${{ steps.monitor.outputs.old_count }}"
            echo ""
            echo "NEW STATE:"
            echo "  Date:  ${{ steps.monitor.outputs.new_date }}"
            echo "  Count: ${{ steps.monitor.outputs.new_count }}"
            echo ""
            echo "Action Required: Manual CSV update is needed."
            echo ""
            echo "1. Go to https://monitoring.pc.gov.ua/"
            echo "2. Експорт -> reCAPTCHA -> CSV -> download"
            echo "3. Place as full_database.csv in scrapers/"
            echo "4. Run process_ukraine.py locally and push results."
            echo "BODYEOF"
          } >> $GITHUB_OUTPUT

      - name: Send email notification
        if: steps.monitor.outcome == 'failure'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          to: ${{ secrets.MAIL_USERNAME }}
          from: Gamble Eagle <${{ secrets.MAIL_USERNAME }}>
          subject: "🦅 Ukraine API Update: ${{ steps.monitor.outputs.new_count }} domains detected #${{ github.run_number }}"
          body: ${{ steps.email.outputs.body }}
