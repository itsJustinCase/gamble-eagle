name: Monitor API Changes

on:
  schedule:
    - cron: '0 5,15 * * *'
  workflow_dispatch:

jobs:
  check-api:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests

      - name: Run monitor script
        id: monitor
        continue-on-error: true
        run: |
          python monitor.py > monitor_output.txt 2>&1
          EXIT_CODE=$?
          cat monitor_output.txt

          # Write parsed values to a separate env file so later steps can read them
          grep '^OLD_DATE=' monitor_output.txt | cut -d'=' -f2- > old_date.txt   || echo "" > old_date.txt
          grep '^OLD_COUNT=' monitor_output.txt | cut -d'=' -f2- > old_count.txt || echo "" > old_count.txt
          grep '^NEW_DATE=' monitor_output.txt | cut -d'=' -f2- > new_date.txt   || echo "" > new_date.txt
          grep '^NEW_COUNT=' monitor_output.txt | cut -d'=' -f2- > new_count.txt || echo "" > new_count.txt

          if [ $EXIT_CODE -eq 1 ]; then
            exit 1
          fi

      - name: Commit updated state
        if: steps.monitor.outcome == 'failure'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add last_state.json
          git diff --staged --quiet || git commit -m "Update API state: Change detected" && git push

      - name: Build email body
        id: email
        if: steps.monitor.outcome == 'failure'
        run: |
          OLD_DATE=$(cat old_date.txt)
          OLD_COUNT=$(cat old_count.txt)
          NEW_DATE=$(cat new_date.txt)
          NEW_COUNT=$(cat new_count.txt)

          {
            echo "subject=🦅 Ukraine API Update: ${NEW_COUNT} domains detected #${{ github.run_number }}"
            echo "body<<BODYEOF"
            echo "Ukraine API Update Detected"
            echo ""
            echo "A change in the database has been identified:"
            echo ""
            echo "PREVIOUS STATE:"
            echo "  Date:  ${OLD_DATE}"
            echo "  Count: ${OLD_COUNT}"
            echo ""
            echo "NEW STATE:"
            echo "  Date:  ${NEW_DATE}"
            echo "  Count: ${NEW_COUNT}"
            echo ""
            echo "Action Required: Manual CSV update is needed."
            echo ""
            echo "1. Go to https://monitoring.pc.gov.ua/"
            echo "2. Експорт -> reCAPTCHA -> CSV -> download"
            echo "3. Place as full_database.csv in UA/ folder"
            echo "4. Run process_ukraine.py locally and push results."
            echo "BODYEOF"
          } >> $GITHUB_OUTPUT

      - name: Send email notification
        if: steps.monitor.outcome == 'failure'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          to: ${{ secrets.MAIL_USERNAME }}
          from: Gamble Eagle <${{ secrets.MAIL_USERNAME }}>
          subject: ${{ steps.email.outputs.subject }}
          body: ${{ steps.email.outputs.body }}
