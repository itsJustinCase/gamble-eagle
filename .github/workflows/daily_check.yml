name: Monitor API Changes

on:
  schedule:
    - cron: '0 15 * * *' # 15:00 UTC Daily
  workflow_dispatch: # Allows manual trigger

jobs:
  check-api:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests

      - name: Run monitor script
        id: monitor
        run: python monitor.py
        continue-on-error: true

      - name: Commit changes if updated
        if: steps.monitor.outcome == 'failure'
        run: |
          git config --global user.name "API Monitor"
          git config --global user.email "actions@github.com"
          git add last_state.json
          git commit -m "Update API state: Change detected"
          git push
