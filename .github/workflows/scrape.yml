name: Romania Scraper
on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
- name: Install Deps
        run: |
          # 1. Update package lists
          sudo apt-get update
          
          # 2. Install Python packages (Explicitly point to root requirements.txt)
          # If requirements.txt is in a folder, change the path below
          pip install -r requirements.txt
          
          # 3. Install Playwright and its specific system dependencies
          playwright install chromium
          playwright install-deps chromium
          
      # Run the script using the subfolder path
      - name: Run Scraper
        run: python scrapers/fetch_romania.py
        
      - name: Commit and Push
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@users.noreply.github.com"
          git add romania.csv
          git commit -m "update romania domains [skip ci]" || exit 0
          git push
