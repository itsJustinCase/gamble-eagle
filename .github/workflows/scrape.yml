name: Romania Scraper
on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install Dependencies
        run: |
          sudo apt-get update
          pip install -r requirements.txt
          playwright install chromium
          sudo npx playwright install-deps chromium
          
      - name: Run Scraper
        # We allow a slightly longer timeout here than in the Python script
        run: python scrapers/fetch_romania.py
        
      - name: Upload Debug Screenshot on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cloudflare-diagnostic
          path: cloudflare_block.png
          if-no-files-found: warn
        
      - name: Commit and Push
        if: success()
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@users.noreply.github.com"
          git add romania.csv
          git commit -m "update romania domains [skip ci]" || exit 0
          git push
